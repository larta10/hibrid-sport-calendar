name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Lint & Build
        run: npm run build --silent
      - name: Run tests (optional)
        run: npm run test:haversine || true
      - name: SEO report
        run: npm run seo-report || true
